gaiaCelery:
  enabled: true
  replicaCount: 1
  imagePullSecrets: []
  image:
    repository: georchestra/gaia-celery
    tag: latest
    pullPolicy: IfNotPresent
  tolerations: []
  affinity: {}
  extraEnvironment: []
  service:
    type: ClusterIP
    port: 5002
    annotations: {}
  resources:
    limits:
      cpu: 2000m
      memory: 1024Mi
    requests:
      cpu: 500m
      memory: 256Mi
gaia:
  enabled: true
  replicaCount: 1
  imagePullSecrets: []
  image:
    repository: georchestra/gaia
    tag: latest
    pullPolicy: IfNotPresent
  tolerations: []
  affinity: {}
  extraEnvironment: []
  service:
    type: ClusterIP
    port: 5002
    annotations: {}
  resources:
    limits:
      cpu: 2000m
      memory: 1024Mi
    requests:
      cpu: 500m
      memory: 256Mi
redis:
  enabled: true
  replicaCount: 1
  imagePullSecrets: []
  image:
    repository: redis
    tag: 8.2.2-alpine
    pullPolicy: IfNotPresent
  tolerations: []
  affinity: {}
  extraEnvironment: []
  service:
    type: ClusterIP
    port: 6379
    annotations: {}
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 128Mi
  redisData:
    # pvName: redis_data
    size: 1Gi
    # storageClassName: default or "-" for empty storageClassName
    accessModes:
    - ReadWriteOnce
datadir:
  image:
    repository: bitnami/git
    tag: latest

  git:
    url: https://github.com/georchestra/datadir.git
    ref: docker-master
georchestra:
  releaseName: georchestra
  fqdn: georchestra-127-0-0-1.nip.io
database:
  auth:
    database: georchestra
    host: georchestra
    port: "5432"
    username: georchestra
    password: georchestra
    # here specify the name of the secret to use
    # existingSecret: mysecret

volumes:
  geonetworkDatadir:
    name: georchestra-geonetwork-datadir
  geoserverDatadir:
    name: georchestra-geoserver-datadir
  mapstoreDatadir:
    name: georchestra-mapstore-datadir
