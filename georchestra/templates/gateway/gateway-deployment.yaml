{{- $webapp := .Values.georchestra.webapps.gateway -}}
{{- if $webapp.enabled -}}
{{- $podAnnotations := merge (dict) .Values.podAnnotations (default dict $webapp.podAnnotations) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "georchestra.fullname" . }}-gateway
  labels:
    {{- include "georchestra.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "georchestra.fullname" . }}-gateway
spec:
  replicas: {{ $webapp.replicaCount }}
  selector:
    matchLabels:
      {{- include "georchestra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "georchestra.fullname" . }}-gateway
  template:
    metadata:
      labels:
        {{- include "georchestra.selectorLabels" . | nindent 8 }}
        org.georchestra.service/name: {{ include "georchestra.fullname" . }}-gateway
        app.kubernetes.io/component: {{ include "georchestra.fullname" . }}-gateway
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
        {{- with .Values.georchestra.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      initContainers:
      {{ include "georchestra.bootstrap_georchestra_datadir" . | nindent 6 }}
      containers:
      - name: georchestra-gateway
        image: {{ include "georchestra.webappImage" $webapp }}
        imagePullPolicy: {{ include "georchestra.webappImagePullPolicy" $webapp }}
        env:
          - name: JAVA_TOOL_OPTIONS
            value: {{ $webapp.environment.JAVA_TOOL_OPTIONS }}
          {{- include "georchestra.service-envs" . | nindent 10 }}
          {{- include "georchestra.common-envs" . | nindent 10 }}
          {{- include "georchestra.ldap-envs" . | nindent 10 }}
          {{- include "georchestra.database-georchestra-envs" . | nindent 10 }}
          {{- if .Values.rabbitmq.enabled -}}
          {{- include "georchestra.rabbitmq-georchestra-envs" . | nindent 10 }}
          {{- end }}
          {{- if $webapp.analytics.enabled }}
          - name: OTEL_JAVAAGENT_ENABLED
            value: "true"
          - name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: "grpc"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: {{ $webapp.analytics.otlpEndpoint | quote }}
          - name: OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_MDC_ATTRIBUTES
            value: "*"
          - name: OTEL_TRACES_EXPORTER
            value: "none"
          - name: OTEL_METRICS_EXPORTER
            value: "none"
          - name: OTEL_LOGS_EXPORTER
            value: "otlp"
          {{- end }}
          {{- if $webapp.extra_environment }}
          {{- $webapp.extra_environment | toYaml | nindent 10 }}
          {{- end }}
        ports:
        - containerPort: 8080
          name: gateway
        volumeMounts:
          - mountPath: /etc/georchestra
            name: georchestra-datadir
        {{- if and $webapp.probes $webapp.probes.livenessProbe }}
        livenessProbe:
          {{- $webapp.probes.livenessProbe | toYaml | nindent 10 }}
        {{- else }}
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          periodSeconds: 10
          timeoutSeconds: 3
        {{- end }}
        {{- if and $webapp.probes $webapp.probes.readinessProbe }}
        readinessProbe:
          {{- $webapp.probes.readinessProbe | toYaml | nindent 10 }}
        {{- end }}
        {{- if and $webapp.probes $webapp.probes.startupProbe }}
        startupProbe:
          {{- $webapp.probes.startupProbe | toYaml | nindent 10 }}
        {{- else }}
        startupProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 5
          periodSeconds: 15
        {{- end }}
        resources:
          {{- toYaml $webapp.resources | nindent 10 }}
      {{- if $webapp.extraContainers }}
        {{ toYaml $webapp.extraContainers | nindent 6 }}
      {{- end }}
      volumes:
      - name: georchestra-datadir
        emptyDir: {}
      {{- if .Values.georchestra.datadir.git.ssh_secret }}
      - name: ssh-secret
        secret:
          secretName: {{ .Values.georchestra.datadir.git.ssh_secret }}
          defaultMode: 0400
      {{- end }}
      {{- if $webapp.registry_secret }}
      imagePullSecrets:
      - name: {{ $webapp.registry_secret }}
      {{- end }}
      {{- if $webapp.tolerations }}
      tolerations:
        {{- $webapp.tolerations | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.hostAliases }}
      hostAliases:
        {{- .Values.hostAliases | toYaml | nindent 8 }}
      {{- end }}
{{- end }}
